<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтуфьево - Правила проекта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(9, 10, 14);
            color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #top-bar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: rgb(22, 26, 37);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        #top-bar span {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: rgb(9, 10, 14);
        }

        .message-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 100%;
            width: fit-content;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 2px;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar .fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            text-transform: uppercase;
        }

        .message-bubble {
            background-color: rgb(22, 26, 37);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 14px;
            line-height: 1.5;
            max-width: 100%;
            min-width: 0;
        }

        .message-bubble .sender {
            font-weight: 700;
            color: #fff;
            margin-right: 6px;
        }

        .message-bubble .text {
            color: rgba(255, 255, 255, 0.5);
            word-break: break-word;
            white-space: pre-wrap;
        }

        #input-area {
            padding: 12px 16px;
            background-color: rgb(22, 26, 37);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            font-style: italic;
            color: rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            font-size: 14px;
            letter-spacing: 0.2px;
        }

        #chat::-webkit-scrollbar {
            width: 5px;
        }
        #chat::-webkit-scrollbar-track {
            background: rgb(9, 10, 14);
        }
        #chat::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }
        #chat::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

<div id="top-bar">
    <span>Официальные фракции</span>
</div>

<div id="chat">
    <div class="message-wrapper">
        <div class="avatar" style="position: relative; width: 32px; height: 32px; border-radius: 50%; overflow: visible; flex-shrink: 0;">
    <img src="/assets/avatar/new.png" alt="avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" style="width: 32px; height: 32px; border-radius: 50%; display: block;">
    <div class="fallback" style="display:none;">3</div>
    <img src="/assets/decorations/starnova.png" alt="decoration" style="position: absolute; top: -6px; right: -6px; width: 41px; height: 41.5px; pointer-events: none; z-index: 10;">
</div>
        <div class="message-bubble">
            <span class="sender">3srlz</span>
            <span class="text">
Официальные фракции проекта "Алтуфьево"

ГИБДД: https://discord.gg/uVuNHs67aE
СМП: https://discord.gg/rmuwHBMVnV
МВД: https://discord.gg/nJZzSgteJU
            </span>
        </div>
    </div>
</div>

<div id="input-area">
    Здесь нельзя отправлять сообщения
</div>

</body>
</html>
