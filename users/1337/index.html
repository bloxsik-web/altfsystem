<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(9, 10, 14);
            color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            width: 40px;
            display: block;
            margin-bottom: 30px;
        }

        .section-title {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .profile-card {
            background-color: rgb(22, 26, 37);
            border-radius: 16px;
            padding: 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            border: 1px solid rgba(255,255,255,0.04);
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.06);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar .placeholder {
            font-size: 48px;
            opacity: 0.3;
        }

        .profile-info {
            flex: 1;
            min-width: 200px;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .profile-tag {
            font-size: 15px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 12px;
        }

        .profile-bio {
            color: rgba(255,255,255,0.5);
            font-size: 15px;
            line-height: 1.6;
            max-width: 500px;
        }

        .profile-stats {
            display: flex;
            gap: 30px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .profile-stat {
            text-align: center;
        }

        .profile-stat .number {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            display: block;
        }

        .profile-stat .label {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .profile-card {
                padding: 24px;
                flex-direction: column;
                text-align: center;
                gap: 24px;
            }

            .profile-info {
                text-align: center;
            }

            .profile-bio {
                max-width: 100%;
            }

            .profile-stats {
                justify-content: center;
            }

            .profile-name {
                font-size: 24px;
            }

            .profile-avatar {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>

    <img class="logo" src="/assets/logo.png" alt="Logo">

    <div class="section-title">Профиль</div>
    <div class="profile-card">
        <div class="profile-avatar">
            <img src="/assets/avatar/gazan.png" alt="Аватар">
        </div>
        <div class="profile-info">
            <div class="profile-name">3srlz</div>
            <div class="profile-tag">@3srlz</div>
            <div class="profile-bio">
                Вы все ебанулись здщесь
            </div>
            <div class="profile-stats">
                <div class="profile-stat">
                    <span class="number">0</span>
                    <span class="label">Подписчиков</span>
                </div>
                <div class="profile-stat">
                    <span class="number">0</span>
                    <span class="label">Подписок</span>
                </div>
                <div class="profile-stat">
                    <span class="number">5</span>
                    <span class="label">Постов</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
